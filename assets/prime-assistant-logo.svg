<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 130" width="490" height="130" role="img" aria-label="Prime Assistant logo">

  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap');
    ]]></style>

    <!-- Deep navy gradient — icon background -->
    <linearGradient id="ng" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#1E3070"/>
      <stop offset="100%" stop-color="#0C1840"/>
    </linearGradient>

    <!-- Sun gold gradient — star & accents -->
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDB913"/>
      <stop offset="100%" stop-color="#C07800"/>
    </linearGradient>

    <!-- Subtle shadow under circle -->
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7"
        flood-color="#0C1840" flood-opacity="0.38"/>
    </filter>

  </defs>

  <!-- ── ICON MARK ── -->

  <!-- Outer navy circle -->
  <circle cx="65" cy="65" r="61" fill="url(#ng)" filter="url(#sh)"/>

  <!-- Inner decorative ring — subtle gold halo -->
  <circle cx="65" cy="65" r="55" fill="none"
    stroke="url(#gg)" stroke-width="1" opacity="0.28"/>

  <!--
    8-pointed star (solar compass)
    Center (65,65) · Outer radius R=44 · Inner radius r=18
    Points alternate outer/inner every 22.5° starting from top (−90°)
  -->
  <polygon
    points="
      65,21       71.89,48.37
      96.11,33.89  81.63,58.11
      109,65       81.63,71.89
      96.11,96.11  71.89,81.63
      65,109       58.11,81.63
      33.89,96.11  48.37,71.89
      21,65        48.37,58.11
      33.89,33.89  58.11,48.37"
    fill="url(#gg)"
  />

  <!-- Center: navy medallion over star, then gold core dot -->
  <circle cx="65" cy="65" r="13" fill="url(#ng)"/>
  <circle cx="65" cy="65" r="5.5" fill="url(#gg)"/>


  <!-- ── SEPARATOR ── -->
  <line x1="144" y1="20" x2="144" y2="110"
    stroke="#8898C8" stroke-width="1" opacity="0.45"/>


  <!-- ── WORDMARK ── -->

  <!-- PRIME — heavy navy -->
  <text x="160" y="67"
    font-family="'Montserrat','Century Gothic','Trebuchet MS',Arial,sans-serif"
    font-weight="900"
    font-size="48"
    fill="#142766"
    letter-spacing="-1">PRIME</text>

  <!-- Thin sun-gold rule -->
  <rect x="160" y="75.5" width="200" height="1.8"
    fill="url(#gg)" rx="0.9"/>

  <!-- ASSISTANT — featherweight gold, wide tracking -->
  <text x="160" y="97"
    font-family="'Montserrat','Century Gothic','Trebuchet MS',Arial,sans-serif"
    font-weight="300"
    font-size="15"
    fill="#E09500"
    letter-spacing="9">ASSISTANT</text>

</svg>
